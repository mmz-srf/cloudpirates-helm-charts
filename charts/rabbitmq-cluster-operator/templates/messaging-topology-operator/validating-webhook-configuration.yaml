{{- if and (eq .Values.msgTopologyOperator.enabled true) (not .Values.msgTopologyOperator.skipCreateAdmissionWebhookConfig) }}
{{/*
    If the user does not have cert-manager and is not providing a secret with the certificates, the chart needs to generate the secret
  */}}
{{- $secretName := printf "%s" (include "rmqco.msgTopologyOperator.webhook.fullname" .) }}
{{- $ca := genCA "rmq-msg-topology-ca" 365 }}
{{- $cert := genSignedCert (include "rmqco.msgTopologyOperator.fullname" .) nil (list (printf "%s.%s.svc" (include "rmqco.msgTopologyOperator.webhook.fullname" .) (include "cloudpirates.namespace" .)) (printf "%s.%s.svc.%s" (include "rmqco.msgTopologyOperator.webhook.fullname" .) (include "cloudpirates.namespace" .) .Values.clusterDomain)) 365 $ca }}
{{- if and (not .Values.useCertManager) (not .Values.msgTopologyOperator.existingWebhookCertSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "rmqmto.labels" . | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "cloudpirates.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ include "cloudpirates.secrets.lookup" (dict "secret" $secretName "key" "tls.crt" "defaultValue" $cert.Cert "context" $) }}
  tls.key: {{ include "cloudpirates.secrets.lookup" (dict "secret" $secretName "key" "tls.key" "defaultValue" $cert.Key "context" $) }}
  ca.crt: {{ include "cloudpirates.secrets.lookup" (dict "secret" $secretName "key" "ca.crt" "defaultValue" $ca.Cert "context" $) }}
{{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  labels:
    {{- include "rmqmto.labels" . | nindent 4 }}
  annotations:
    {{- if and (.Values.useCertManager) (not .Values.msgTopologyOperator.existingWebhookCertSecret)}}
    cert-manager.io/inject-ca-from: {{ printf "%s/%s" (include "cloudpirates.namespace" .) ( include "rmqco.msgTopologyOperator.webhook.secretName" . ) }}
    {{- else if and (.Values.useCertManager) (.Values.msgTopologyOperator.existingWebhookCertSecret)}}
    cert-manager.io/inject-ca-from-secret: {{ printf "%s/%s" (include "cloudpirates.namespace" .) ( include "rmqco.msgTopologyOperator.webhook.secretName" . ) }}
    {{- end }}
    {{- if .Values.commonAnnotations }}
    {{- include "cloudpirates.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
  name: {{ template "rmqco.msgTopologyOperator.webhook.fullname.namespace" . }}
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      {{- if not .Values.useCertManager }}
      caBundle: {{ include "cloudpirates.secrets.lookup" (dict "secret" $secretName "key" "ca.crt" "defaultValue" (default $ca.Cert .Values.msgTopologyOperator.existingWebhookCertCABundle) "context" $) }}
      {{- end }}
      service:
        name: {{ template "rmqco.msgTopologyOperator.webhook.fullname" . }}
        namespace: {{ include "cloudpirates.namespace" . }}
        path: /validate-rabbitmq-com-v1beta1-binding
        port: {{ .Values.msgTopologyOperator.service.ports.webhook }}
    failurePolicy: Fail
    name: vbinding-v1beta1.kb.io
    rules:
      - apiGroups:
          - rabbitmq.com
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - bindings
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      {{- if not .Values.useCertManager }}
      caBundle: {{ include "cloudpirates.secrets.lookup" (dict "secret" $secretName "key" "ca.crt" "defaultValue" (default $ca.Cert .Values.msgTopologyOperator.existingWebhookCertCABundle) "context" $) }}
      {{- end }}
      service:
        name: {{ template "rmqco.msgTopologyOperator.webhook.fullname" . }}
        namespace: {{ include "cloudpirates.namespace" . }}
        path: /validate-rabbitmq-com-v1beta1-exchange
        port: {{ .Values.msgTopologyOperator.service.ports.webhook }}
    failurePolicy: Fail
    name: vexchange.kb.io
    rules:
      - apiGroups:
          - rabbitmq.com
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - exchanges
    sideEffects: None
  - admissionReviewVersions:
      - v1
    clientConfig:
      {{- if not .Values.useCertManager }}
