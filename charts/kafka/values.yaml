## @param namespaceOverride String to override the namespace for all resources
namespaceOverride: ""
## @param clusterDomain Kubernetes cluster domain used to build internal service FQDNs
clusterDomain: cluster.local
## @param clusterId The KRaft cluster ID used to format storage. Must be a valid base64-encoded UUID (22 chars) and identical across all nodes of the same cluster. Override with your own per cluster; generate one with `kafka-storage.sh random-uuid`. Keep this value stable across upgrades and scale-ups.
clusterId: "oUl0u_8RQBym0t93b891HA"
## @param nodeIdOffset Offset added to the pod ordinal to compute each node's `node.id` (e.g. set to 1 to start node IDs at 1 instead of 0)
