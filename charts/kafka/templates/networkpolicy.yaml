{{- if .Values.networkPolicy.enabled }}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "kafka.fullname" . }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  {{- with (include "kafka.annotations" .) }}
  annotations:
{{- . | indent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "kafka.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  egress:
    - {}
  ingress:
    # Allow client connections to Kafka brokers (includes the kafka-exporter metrics Deployment)
    - ports:
        - port: {{ .Values.service.ports.client }}
    # Allow inter-broker (INTERNAL listener) and controller (KRaft) traffic between nodes
    - ports:
        - port: {{ .Values.service.ports.internal }}
        - port: {{ .Values.service.ports.controller }}
      from:
        - podSelector:
            matchLabels:
              {{- include "kafka.selectorLabels" . | nindent 14 }}
{{- end }}
