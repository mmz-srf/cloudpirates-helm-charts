{{- if and .Values.tls.enabled (eq .Values.tls.source "self-signed") }}
{{- $fullname := include "kafka.fullname" . }}
{{- $secretName := printf "%s-tls" $fullname }}
{{- $days := int .Values.tls.autoGenerated.daysValid }}
{{- $altNames := include "kafka.tls.altNames" . | fromYamlArray }}
{{- /*
  Reuse the certificate already stored in the cluster so the CA stays stable across upgrades.
  Regenerating it would break trust for existing clients and require re-distributing the CA.
*/}}
{{- $existing := (lookup "v1" "Secret" (include "cloudpirates.namespace" .) $secretName) }}
{{- $crt := "" }}
{{- $key := "" }}
{{- $ca := "" }}
{{- if and $existing $existing.data (index $existing.data "tls.crt") }}
{{- $crt = index $existing.data "tls.crt" }}
{{- $key = index $existing.data "tls.key" }}
{{- $ca = index $existing.data "ca.crt" }}
{{- else }}
{{- $caCN := .Values.tls.autoGenerated.caCommonName | default (printf "%s-ca" $fullname) }}
{{- $caCert := genCA $caCN $days }}
{{- $cn := printf "%s.%s.svc.%s" $fullname (include "cloudpirates.namespace" .) (.Values.clusterDomain | default "cluster.local") }}
{{- $cert := genSignedCert $cn (list "127.0.0.1") $altNames $days $caCert }}
{{- $crt = $cert.Cert | b64enc }}
{{- $key = $cert.Key | b64enc }}
{{- $ca = $caCert.Cert | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  {{- with (include "kafka.annotations" .) }}
  annotations:
{{- . | indent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $crt | quote }}
  tls.key: {{ $key | quote }}
  ca.crt: {{ $ca | quote }}
{{- end }}
