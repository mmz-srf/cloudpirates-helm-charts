{{- if and (include "kafka.auth.enabled" .) (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kafka.fullname" . }}
  namespace: {{ include "cloudpirates.namespace" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
  {{- with (include "kafka.annotations" .) }}
  annotations:
{{- . | indent 4 }}
  {{- end }}
type: Opaque
data:
  {{- /*
    Look up the existing Secret so auto-generated passwords stay stable across upgrades.
    Regenerating the inter-broker/controller passwords on every upgrade would break the
    KRaft quorum, so we always prefer the value already stored in the cluster.
  */}}
  {{- $existing := (lookup "v1" "Secret" (include "cloudpirates.namespace" .) (include "kafka.fullname" .)) }}
  {{- $existingData := dict }}
  {{- if and $existing $existing.data }}
  {{- $existingData = $existing.data }}
  {{- end }}
  {{- if .Values.auth.client.enabled }}
  client-password: {{ (index $existingData "client-password") | default (.Values.auth.clientPassword | default (randAlphaNum 24) | b64enc) | quote }}
  {{- end }}
  {{- if .Values.auth.interBroker.enabled }}
  inter-broker-password: {{ (index $existingData "inter-broker-password") | default (.Values.auth.interBrokerPassword | default (randAlphaNum 24) | b64enc) | quote }}
  {{- end }}
  {{- if .Values.auth.controller.enabled }}
  controller-password: {{ (index $existingData "controller-password") | default (.Values.auth.controllerPassword | default (randAlphaNum 24) | b64enc) | quote }}
  {{- end }}
{{- end }}
